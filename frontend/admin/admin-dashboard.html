<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecruitAI Admin — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.1/feather.min.js"></script>
    <style>
      :root {
        /* Neutral background */
        --background: #f9fafb;
        --surface: #ffffff;

        /* Indigo primary */
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --primary-light: #eef2ff;

        /* Green success */
        --success: #10b981;
        --success-light: #ecfdf5;

        /* Amber warning */
        --warning: #f59e0b;
        --warning-light: #fffbeb;

        --danger: #ef4444;
        --danger-light: #fef2f2;

        --text-primary: #111827;
        --text-secondary: #6b7280;
        --text-tertiary: #9ca3af;
        --border: #e5e7eb;

        --shadow:
          0 1px 3px rgba(17, 24, 39, 0.06), 0 1px 2px rgba(17, 24, 39, 0.04);
        --shadow-md: 0 8px 24px rgba(17, 24, 39, 0.08);
        --radius: 10px;
        --radius-lg: 16px;

        /* Type scale: titles 20px bold / body 14px */
        --text-title: 20px;
        --text-body: 14px;
        --text-sm: 12.5px;
        --text-xs: 11.5px;
        --text-value: 26px;

        /* Generous spacing scale */
        --space-1: 6px;
        --space-2: 10px;
        --space-3: 16px;
        --space-4: 24px;
        --space-5: 32px;
        --space-6: 40px;

        --sidebar-w: 248px;
        --sidebar-w-collapsed: 80px;
        --header-h: 68px;
        --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--background);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        font-size: var(--text-body);
        line-height: 1.5;
      }
      body {
        min-height: 100vh;
      }
      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      img {
        display: block;
        max-width: 100%;
      }
      svg.feather {
        width: 18px;
        height: 18px;
        stroke-width: 2;
        vertical-align: middle;
        flex-shrink: 0;
      }

      :focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ===== Skip link ===== */
      .skip-link {
        position: absolute;
        top: -48px;
        left: var(--space-2);
        background: var(--primary);
        color: #fff;
        padding: 10px 16px;
        border-radius: var(--radius);
        z-index: 200;
        transition: top var(--transition);
        font-size: var(--text-body);
        font-weight: 600;
      }
      .skip-link:focus {
        top: var(--space-2);
      }

      /* ===== App Shell ===== */
      .app-shell {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: var(--header-h) 1fr;
        min-height: 100vh;
      }

      /* ===== Header ===== */
      .header {
        grid-column: 1 / -1;
        height: var(--header-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-4);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--primary-light);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-name {
        font-weight: 800;
        font-size: 18px;
        color: var(--primary);
        letter-spacing: -0.02em;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: var(--space-3);
      }
      .header-search {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        background: var(--background);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 9px 14px;
        width: 260px;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
      }
      .header-search:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }
      .header-search svg {
        color: var(--text-tertiary);
        width: 16px;
        height: 16px;
      }
      .header-search input {
        border: none;
        background: transparent;
        outline: none;
        font-size: var(--text-body);
        width: 100%;
        color: var(--text-primary);
        font-family: inherit;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        position: relative;
        transition: background var(--transition);
      }
      .icon-btn:hover {
        background: var(--background);
      }
      .icon-btn .dot {
        position: absolute;
        top: 8px;
        right: 9px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--danger);
        border: 2px solid var(--surface);
      }
      .avatar-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--border);
        padding: 0;
        overflow: hidden;
        background: var(--primary-light);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        font-weight: 700;
        font-size: 13.5px;
        transition:
          border-color var(--transition),
          transform var(--transition);
      }
      .avatar-btn:hover {
        border-color: var(--primary);
        transform: translateY(-1px);
      }

      /* ===== Layout: single column, bottom nav on all breakpoints ===== */
      .layout {
        display: grid;
        grid-template-columns: 1fr;
        grid-column: 1 / -1;
      }

      /* ===== Main content ===== */
      .main {
        padding: var(--space-4) var(--space-3) 100px;
        min-width: 0;
      }
      .page-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-4);
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .page-title {
        font-size: var(--text-title);
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .page-sub {
        color: var(--text-secondary);
        font-size: var(--text-sm);
        margin-top: 3px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        padding: 10px 18px;
        border-radius: var(--radius);
        font-weight: 600;
        font-size: var(--text-body);
        border: 1px solid transparent;
        transition:
          background var(--transition),
          border-color var(--transition),
          color var(--transition),
          transform 100ms;
      }
      .btn svg {
        width: 16px;
        height: 16px;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }
      .btn-ghost {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text-primary);
      }
      .btn-ghost:hover {
        background: var(--background);
      }

      /* ===== KPI Grid ===== */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-3);
        margin-bottom: var(--space-4);
      }
      .kpi-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
        transition:
          box-shadow var(--transition),
          transform var(--transition);
        opacity: 0;
        transform: translateY(10px);
        animation: cardIn 480ms var(--transition) forwards;
      }
      .kpi-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }
      .kpi-card:nth-child(1) {
        animation-delay: 40ms;
      }
      .kpi-card:nth-child(2) {
        animation-delay: 100ms;
      }
      .kpi-card:nth-child(3) {
        animation-delay: 160ms;
      }
      .kpi-card:nth-child(4) {
        animation-delay: 220ms;
      }
      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .kpi-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .kpi-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .kpi-icon svg {
        width: 18px;
        height: 18px;
      }
      .kpi-icon.users {
        background: var(--primary-light);
        color: var(--primary);
      }
      .kpi-icon.jobs {
        background: var(--warning-light);
        color: var(--warning);
      }
      .kpi-icon.uptime {
        background: var(--success-light);
        color: var(--success);
      }
      .kpi-icon.storage {
        background: #f3e8ff;
        color: #7c3aed;
      }

      .kpi-badge {
        font-size: var(--text-sm);
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .kpi-badge svg {
        width: 12px;
        height: 12px;
      }
      .kpi-badge.up {
        color: var(--success);
        background: var(--success-light);
      }
      .kpi-badge.status {
        color: var(--success);
        background: var(--success-light);
      }
      .kpi-badge.neutral {
        color: var(--text-secondary);
        background: var(--background);
      }

      .kpi-label {
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
        text-transform: uppercase;
      }
      .kpi-value {
        font-size: var(--text-value);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-top: 4px;
      }

      .kpi-progress-track {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: var(--border);
        overflow: hidden;
        margin-top: 2px;
      }
      .kpi-progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--primary), #8b5cf6);
        width: 0%;
        transition: width 900ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ===== Panels ===== */
      .panels {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--space-4);
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: var(--space-4);
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-4);
        gap: var(--space-2);
        flex-wrap: wrap;
      }
      .panel-title {
        font-size: var(--text-title);
        font-weight: 700;
      }
      .panel-meta {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        font-weight: 600;
      }
      .view-all {
        font-size: var(--text-body);
        font-weight: 700;
        color: var(--primary);
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        padding: 7px 12px;
        border-radius: var(--radius);
        transition: background var(--transition);
      }
      .view-all svg {
        width: 15px;
        height: 15px;
      }
      .view-all:hover {
        background: var(--primary-light);
      }

      /* ===== Bar chart ===== */
      .chart-wrap {
        position: relative;
      }
      .bar-chart {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: var(--space-2);
        height: 220px;
        padding-top: var(--space-2);
        border-bottom: 1px solid var(--border);
      }
      .bar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        height: 100%;
        gap: var(--space-1);
        position: relative;
      }
      .bar {
        width: 60%;
        max-width: 34px;
        border-radius: 8px 8px 3px 3px;
        background: linear-gradient(180deg, #818cf8, var(--primary));
        height: 0%;
        transition:
          height 900ms cubic-bezier(0.4, 0, 0.2, 1),
          filter var(--transition),
          transform var(--transition);
        cursor: pointer;
        position: relative;
      }
      .bar:hover,
      .bar:focus-visible {
        filter: brightness(1.08);
        transform: scaleX(1.15);
      }
      .bar-col.peak .bar {
        background: linear-gradient(180deg, #34d399, var(--success));
      }
      .bar-tooltip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: var(--text-primary);
        color: #fff;
        font-size: var(--text-xs);
        font-weight: 700;
        padding: 4px 9px;
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity var(--transition),
          transform var(--transition);
      }
      .bar-col:hover .bar-tooltip,
      .bar:focus-visible + .bar-tooltip {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .bar-labels {
        display: flex;
        justify-content: space-between;
        gap: var(--space-2);
        margin-top: var(--space-2);
      }
      .bar-labels span {
        flex: 1;
        text-align: center;
        font-size: var(--text-sm);
        color: var(--text-secondary);
        font-weight: 600;
      }

      /* ===== Activity feed ===== */
      .activity-filter {
        display: flex;
        gap: var(--space-1);
        margin-bottom: var(--space-3);
        flex-wrap: wrap;
      }
      .chip {
        font-size: var(--text-sm);
        font-weight: 600;
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
        transition: all var(--transition);
      }
      .chip:hover {
        background: var(--background);
      }
      .chip.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .activity-list {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        max-height: 340px;
        overflow-y: auto;
        scroll-behavior: smooth;
        padding-right: 4px;
      }
      .activity-list::-webkit-scrollbar {
        width: 6px;
      }
      .activity-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 999px;
      }

      .activity-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-2);
        padding: var(--space-3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        transition:
          background var(--transition),
          border-color var(--transition);
      }
      .activity-item:hover {
        background: var(--background);
        border-color: #d1d5db;
      }
      .activity-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .activity-icon svg {
        width: 16px;
        height: 16px;
      }
      .activity-icon.key {
        background: var(--primary-light);
        color: var(--primary);
      }
      .activity-icon.backup {
        background: var(--success-light);
        color: var(--success);
      }
      .activity-icon.revoked {
        background: var(--danger-light);
        color: var(--danger);
      }
      .activity-icon.policy {
        background: var(--warning-light);
        color: var(--warning);
      }

      .activity-body {
        min-width: 0;
        flex: 1;
      }
      .activity-title {
        font-size: var(--text-body);
        font-weight: 700;
      }
      .activity-sub {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .activity-time {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        font-weight: 600;
        flex-shrink: 0;
        white-space: nowrap;
      }

      /* ===== Empty state ===== */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: var(--space-6) var(--space-4);
        color: var(--text-secondary);
        gap: var(--space-2);
      }
      .empty-state svg {
        width: 30px;
        height: 30px;
        color: var(--text-tertiary);
      }
      .empty-state strong {
        color: var(--text-primary);
        font-size: var(--text-body);
      }
      .empty-state p {
        font-size: var(--text-sm);
        max-width: 280px;
      }

      /* ===== Loading ===== */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--background);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: var(--space-3);
        z-index: 500;
        transition:
          opacity 400ms ease,
          visibility 400ms ease;
      }
      .loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 3px solid var(--border);
        border-top-color: var(--primary);
        animation: spin 800ms linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-overlay span {
        font-size: var(--text-body);
        color: var(--text-secondary);
        font-weight: 600;
      }

      /* ===== Mobile bottom nav ===== */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: var(--space-2) 4px
          calc(var(--space-2) + env(safe-area-inset-bottom));
        z-index: 100;
      }
      .bottom-nav-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 2px;
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--text-secondary);
        border-radius: var(--radius);
      }
      .bottom-nav-link svg {
        width: 18px;
        height: 18px;
      }
      .bottom-nav-link.active {
        color: var(--primary);
      }

      /* ===== Toast ===== */
      .toast {
        position: fixed;
        bottom: 88px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--text-primary);
        color: #fff;
        font-size: var(--text-body);
        font-weight: 600;
        padding: 12px 18px;
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity var(--transition),
          transform var(--transition);
        z-index: 300;
        display: flex;
        align-items: center;
        gap: var(--space-1);
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast svg {
        width: 16px;
        height: 16px;
        color: var(--success);
      }

      /* ===== RESPONSIVE BREAKPOINTS ===== */
      /* Mobile First - Default styles above are for mobile */

      /* Tablet: 768px and up */
      @media (min-width: 768px) {
        /* 2-column layouts, show sidebars */
        .kpi-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: var(--space-4);
        }
        .panels {
          grid-template-columns: 1fr;
        }
        .header-search {
          display: flex;
        }
        .main {
          padding: var(--space-5) var(--space-5) 100px;
          max-width: 720px;
          margin: 0 auto;
        }
      }

      /* Desktop: 1024px and up */
      @media (min-width: 1024px) {
        /* Full desktop layout, 3-4 columns */
        .kpi-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .panels {
          grid-template-columns: 1.4fr 1fr;
          align-items: start;
        }
        .main {
          padding: var(--space-6) var(--space-6) 110px;
          max-width: 960px;
        }
      }

      /* Large Desktop: 1280px and up */
      @media (min-width: 1280px) {
        /* Max width containers, extra whitespace */
        .main {
          max-width: 1200px;
          padding: var(--space-6) var(--space-6) 120px;
        }
        .panels {
          gap: var(--space-5);
        }
        .kpi-grid {
          gap: var(--space-5);
        }
      }

      @media (max-width: 767px) {
        .header-search {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Loading overlay -->
    <div
      class="loading-overlay"
      id="loadingOverlay"
      role="status"
      aria-live="polite"
    >
      <div class="spinner" aria-hidden="true"></div>
      <span>Loading dashboard…</span>
    </div>

    <div class="app-shell">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"
              ><img
                src="../assets/images/logo.png"
                alt="Recruiter Logo"
                class="logo-svg"
                style="height: 50px"
                width="50"
            /></span>
            <span class="brand-name"> Admin</span>
          </div>
        </div>
        <div class="header-right">
          <div class="header-search" role="search">
            <i data-feather="search" aria-hidden="true"></i>
            <input
              type="search"
              id="searchInput"
              placeholder="Search users, jobs, logs…"
              aria-label="Search dashboard"
            />
          </div>
          <button
            class="icon-btn"
            id="notifBtn"
            aria-label="Notifications, 3 unread"
          >
            <i data-feather="bell" aria-hidden="true"></i>
            <span class="dot" aria-hidden="true"></span>
          </button>
          <button
            class="avatar-btn"
            id="avatarBtn"
            aria-label="Open account menu for Alex Morgan"
          >
            AM
          </button>
        </div>
      </header>

      <div class="layout">
        <!-- Main content -->
        <main class="main" id="main-content">
          <div class="page-title-row">
            <div>
              <h1 class="page-title">System Health</h1>
              <p class="page-sub">
                Live overview of platform performance and activity
              </p>
            </div>
            <button class="btn btn-primary" id="refreshBtn">
              <i data-feather="refresh-cw" aria-hidden="true"></i> Refresh data
            </button>
          </div>

          <!-- KPI Grid -->
          <section class="kpi-grid" aria-label="Key performance indicators">
            <article class="kpi-card">
              <div class="kpi-top">
                <span class="kpi-icon users" aria-hidden="true"
                  ><i data-feather="users"></i
                ></span>
                <span class="kpi-badge up"
                  ><i data-feather="arrow-up" aria-hidden="true"></i> 5%</span
                >
              </div>
              <div>
                <p class="kpi-label">Total Users</p>
                <p class="kpi-value">12.5k</p>
              </div>
            </article>

            <article class="kpi-card">
              <div class="kpi-top">
                <span class="kpi-icon jobs" aria-hidden="true"
                  ><i data-feather="briefcase"></i
                ></span>
                <span class="kpi-badge status">Active</span>
              </div>
              <div>
                <p class="kpi-label">Total Jobs</p>
                <p class="kpi-value">842</p>
              </div>
            </article>

            <article class="kpi-card">
              <div class="kpi-top">
                <span class="kpi-icon uptime" aria-hidden="true"
                  ><i data-feather="zap"></i
                ></span>
              </div>
              <div>
                <p class="kpi-label">API Uptime</p>
                <p class="kpi-value">99.98%</p>
              </div>
            </article>

            <article class="kpi-card">
              <div class="kpi-top">
                <span class="kpi-icon storage" aria-hidden="true"
                  ><i data-feather="database"></i
                ></span>
                <span class="kpi-badge neutral">64%</span>
              </div>
              <div>
                <p class="kpi-label">Storage</p>
                <p class="kpi-value">2.1 TB</p>
              </div>
              <div
                class="kpi-progress-track"
                role="progressbar"
                aria-label="Storage used"
                aria-valuenow="64"
                aria-valuemin="0"
                aria-valuemax="100"
              >
                <div class="kpi-progress-fill" id="storageFill"></div>
              </div>
            </article>
          </section>

          <!-- Panels -->
          <div class="panels">
            <!-- Chart panel -->
            <section class="panel" aria-labelledby="chartTitle">
              <div class="panel-head">
                <h2 class="panel-title" id="chartTitle">User Sign-ups</h2>
                <span class="panel-meta">Last 7 Days</span>
              </div>
              <div class="chart-wrap">
                <div
                  class="bar-chart"
                  id="barChart"
                  role="img"
                  aria-label="Bar chart of user sign-ups from Monday to Sunday, trending upward with a peak on Saturday"
                >
                  <!-- bars injected by JS -->
                </div>
                <div class="bar-labels" id="barLabels"></div>
              </div>
            </section>

            <!-- Activity panel -->
            <section class="panel" aria-labelledby="activityTitle">
              <div class="panel-head">
                <h2 class="panel-title" id="activityTitle">
                  Recent Activities
                </h2>
                <button class="view-all" id="viewAllBtn">
                  View All <i data-feather="arrow-right" aria-hidden="true"></i>
                </button>
              </div>
              <div
                class="activity-filter"
                role="group"
                aria-label="Filter activities"
              >
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="security">Security</button>
                <button class="chip" data-filter="system">System</button>
              </div>
              <div
                class="activity-list"
                id="activityList"
                aria-live="polite"
              ></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <!-- Bottom nav (all breakpoints) -->
    <nav class="bottom-nav" aria-label="Primary mobile navigation">
      <a
        href="#"
        class="bottom-nav-link active"
        data-nav="health"
        aria-current="page"
        ><i data-feather="activity" aria-hidden="true"></i>Health</a
      >
      <a href="#" class="bottom-nav-link" data-nav="users"
        ><i data-feather="users" aria-hidden="true"></i>Users</a
      >
      <a href="#" class="bottom-nav-link" data-nav="analytics"
        ><i data-feather="bar-chart-2" aria-hidden="true"></i>Analytics</a
      >
      <a href="#" class="bottom-nav-link" data-nav="logs"
        ><i data-feather="terminal" aria-hidden="true"></i>Logs</a
      >
    </nav>

    <div class="toast" id="toast" role="status">
      <i data-feather="check-circle" aria-hidden="true"></i
      ><span id="toastMsg">Done</span>
    </div>

    <script>
      (function () {
        "use strict";

        /* ---------- Data ---------- */
        var chartData = [
          { day: "Mon", value: 38 },
          { day: "Tue", value: 52 },
          { day: "Wed", value: 58 },
          { day: "Thu", value: 46 },
          { day: "Fri", value: 74 },
          { day: "Sat", value: 92 },
          { day: "Sun", value: 81 },
        ];

        var activities = [
          {
            id: 1,
            icon: "key",
            cls: "key",
            title: "API Key generated",
            sub: "Production environment",
            time: "2 mins ago",
            cat: "security",
          },
          {
            id: 2,
            icon: "upload-cloud",
            cls: "backup",
            title: "Backup completed",
            sub: "Daily automated snapshot",
            time: "45 mins ago",
            cat: "system",
          },
          {
            id: 3,
            icon: "user-x",
            cls: "revoked",
            title: "User access revoked",
            sub: "ID: #49201 · Security policy",
            time: "2 hrs ago",
            cat: "security",
          },
          {
            id: 4,
            icon: "settings",
            cls: "policy",
            title: "Global policy update",
            sub: "AI matching threshold adjusted",
            time: "5 hrs ago",
            cat: "system",
          },
          {
            id: 5,
            icon: "key",
            cls: "key",
            title: "API Key rotated",
            sub: "Staging environment",
            time: "7 hrs ago",
            cat: "security",
          },
          {
            id: 6,
            icon: "upload-cloud",
            cls: "backup",
            title: "Backup completed",
            sub: "Weekly full snapshot",
            time: "1 day ago",
            cat: "system",
          },
          {
            id: 7,
            icon: "user-x",
            cls: "revoked",
            title: "User access revoked",
            sub: "ID: #48810 · Inactivity",
            time: "1 day ago",
            cat: "security",
          },
        ];

        /* ---------- Feather icon render helper ---------- */
        function renderIcons() {
          if (window.feather) window.feather.replace({ "stroke-width": 2 });
        }

        /* ---------- Loading overlay ---------- */
        window.addEventListener("load", function () {
          renderIcons();
          setTimeout(function () {
            document.getElementById("loadingOverlay").classList.add("hidden");
            animateStorage();
            buildChart();
          }, 500);
        });

        /* ---------- Storage progress animation ---------- */
        function animateStorage() {
          var fill = document.getElementById("storageFill");
          requestAnimationFrame(function () {
            fill.style.width = "64%";
          });
        }

        /* ---------- Build bar chart ---------- */
        function buildChart() {
          var chartEl = document.getElementById("barChart");
          var labelsEl = document.getElementById("barLabels");
          var max = Math.max.apply(
            null,
            chartData.map(function (d) {
              return d.value;
            }),
          );
          var peakValue = max;

          chartEl.innerHTML = "";
          labelsEl.innerHTML = "";

          chartData.forEach(function (d, i) {
            var col = document.createElement("div");
            col.className = "bar-col" + (d.value === peakValue ? " peak" : "");

            var bar = document.createElement("div");
            bar.className = "bar";
            bar.tabIndex = 0;
            bar.setAttribute("role", "img");
            bar.setAttribute(
              "aria-label",
              d.day + ": " + d.value + " sign-ups",
            );
            bar.dataset.value = d.value;
            bar.dataset.day = d.day;

            var tooltip = document.createElement("div");
            tooltip.className = "bar-tooltip";
            tooltip.textContent = d.day + " · " + d.value + " sign-ups";

            bar.addEventListener("click", function () {
              console.log("Bar clicked:", d.day, d.value, "sign-ups");
              showToast(d.day + ": " + d.value + " sign-ups");
            });

            col.appendChild(bar);
            col.appendChild(tooltip);
            chartEl.appendChild(col);

            var label = document.createElement("span");
            label.textContent = d.day;
            labelsEl.appendChild(label);

            // Animate height on next frame, staggered
            setTimeout(
              function () {
                bar.style.height = (d.value / max) * 100 + "%";
              },
              80 + i * 90,
            );
          });
        }

        /* ---------- Activity feed ---------- */
        var activityListEl = document.getElementById("activityList");
        var currentFilter = "all";

        function renderActivities(filter) {
          var filtered =
            filter === "all"
              ? activities
              : activities.filter(function (a) {
                  return a.cat === filter;
                });
          activityListEl.innerHTML = "";

          if (filtered.length === 0) {
            var empty = document.createElement("div");
            empty.className = "empty-state";
            empty.innerHTML =
              '<i data-feather="folder" aria-hidden="true"></i>' +
              "<strong>No activity here yet</strong>" +
              "<p>Nothing matches this filter right now. New events will appear as they happen.</p>";
            activityListEl.appendChild(empty);
            renderIcons();
            return;
          }

          filtered.forEach(function (a) {
            var item = document.createElement("article");
            item.className = "activity-item";
            item.innerHTML =
              '<span class="activity-icon ' +
              a.cls +
              '" aria-hidden="true"><i data-feather="' +
              a.icon +
              '"></i></span>' +
              '<div class="activity-body">' +
              '<p class="activity-title">' +
              a.title +
              "</p>" +
              '<p class="activity-sub">' +
              a.sub +
              "</p>" +
              "</div>" +
              '<span class="activity-time">' +
              a.time +
              "</span>";
            item.addEventListener("click", function () {
              console.log("Activity clicked:", a.title);
            });
            activityListEl.appendChild(item);
          });
          renderIcons();
        }
        renderActivities("all");

        document.querySelectorAll(".chip").forEach(function (chip) {
          chip.addEventListener("click", function () {
            document.querySelectorAll(".chip").forEach(function (c) {
              c.classList.remove("active");
            });
            chip.classList.add("active");
            currentFilter = chip.dataset.filter;
            renderActivities(currentFilter);
            console.log("Activity filter set to:", currentFilter);
          });
        });

        /* Auto-scroll the activity feed gently, pausing on hover/focus */
        var autoScroll = (function () {
          var direction = 1;
          var paused = false;
          var timer = null;

          function tick() {
            if (paused) return;
            var el = activityListEl;
            if (el.scrollHeight <= el.clientHeight) return;
            el.scrollTop += direction * 0.6;
            if (el.scrollTop + el.clientHeight >= el.scrollHeight - 1)
              direction = -1;
            if (el.scrollTop <= 0) direction = 1;
          }
          function start() {
            stop();
            timer = setInterval(tick, 30);
          }
          function stop() {
            if (timer) clearInterval(timer);
          }
          activityListEl.addEventListener("mouseenter", function () {
            paused = true;
          });
          activityListEl.addEventListener("mouseleave", function () {
            paused = false;
          });
          activityListEl.addEventListener("focusin", function () {
            paused = true;
          });
          activityListEl.addEventListener("focusout", function () {
            paused = false;
          });

          return { start: start, stop: stop };
        })();
        autoScroll.start();

        /* ---------- View all / refresh buttons ---------- */
        document
          .getElementById("viewAllBtn")
          .addEventListener("click", function () {
            console.log("View all activities clicked");
            showToast("Opening full activity log…");
          });

        document
          .getElementById("refreshBtn")
          .addEventListener("click", function (e) {
            var btn = e.currentTarget;
            var icon = btn.querySelector("svg");
            if (icon) {
              icon.style.transition = "transform 600ms ease";
              icon.style.transform = "rotate(360deg)";
              setTimeout(function () {
                icon.style.transform = "rotate(0deg)";
              }, 620);
            }
            console.log("Refresh data clicked");
            showToast("Dashboard data refreshed");
          });

        document
          .getElementById("notifBtn")
          .addEventListener("click", function () {
            console.log("Notifications opened");
          });
        document
          .getElementById("avatarBtn")
          .addEventListener("click", function () {
            console.log("Account menu opened");
          });

        /* ---------- Search "validation" ---------- */
        var searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            var value = searchInput.value.trim();
            if (value.length === 0) {
              searchInput.setAttribute("aria-invalid", "true");
              showToast("Type something to search");
              return;
            }
            searchInput.removeAttribute("aria-invalid");
            console.log("Search submitted:", value);
            showToast('Searching for "' + value + '"…');
          }
        });

        /* ---------- Nav active state ---------- */
        var navLinks = document.querySelectorAll("[data-nav]");
        navLinks.forEach(function (link) {
          link.addEventListener("click", function (e) {
            e.preventDefault();
            var target = link.dataset.nav;
            navLinks.forEach(function (l) {
              var isActive = l.dataset.nav === target;
              l.classList.toggle("active", isActive);
              if (l.hasAttribute("aria-current")) {
                if (isActive) l.setAttribute("aria-current", "page");
                else l.removeAttribute("aria-current");
              }
            });
            console.log("Navigated to:", target);
          });
        });

        /* ---------- Toast helper ---------- */
        var toastTimer = null;
        function showToast(msg) {
          var toast = document.getElementById("toast");
          var toastMsg = document.getElementById("toastMsg");
          toastMsg.textContent = msg;
          toast.classList.add("show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () {
            toast.classList.remove("show");
          }, 2600);
        }
      })();
    </script>
  </body>
</html>
