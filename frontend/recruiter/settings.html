<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitAI - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 28px; font-weight: 800; margin: 0 0 4px; }
    .page-header p { color: var(--text-secondary); font-size: 15px; margin: 0; }
    .settings-container { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text-primary); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .form-control { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 14px; width: 100%; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .settings-content { padding: 24px; }
    .settings-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; background: var(--surface-alt); }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="dashboard.html" class="logo">
        <img src="../assets/images/logo.png" alt="RecruitAI Logo" />
        <span>RecruitAI</span>
      </a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">Dashboard</a>
        <a href="manage-jobs.html" class="nav-link" data-page="jobs">Jobs</a>
        <a href="candidates.html" class="nav-link" data-page="candidates">Candidates</a>
        <a href="schedule-interview.html" class="nav-link" data-page="interviews">Interviews</a>
      </nav>
      <div class="header-actions">
        <div class="user-avatar" id="userAvatar">U</div>
        <button class="btn btn-secondary" onclick="window.API.Auth.logout()" style="padding: 6px 12px; font-size: 13px; margin-left: 8px;">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top: 32px; padding-bottom: 40px">
    <div class="page-header">
      <h1>Account Settings</h1>
      <p>Manage your profile and account preferences.</p>
    </div>

    <div class="settings-container">
      <form id="profileForm">
        <div class="settings-content">
          <h2 class="section-title">Personal Information</h2>
          <div class="form-grid">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" id="firstName" required />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" id="lastName" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" id="email" disabled />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" class="form-control" id="phone" />
            </div>
            <div class="form-group">
              <label>Role</label>
              <input type="text" class="form-control" id="role" disabled />
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button type="submit" class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
        </div>
      </form>
    </div>

    <div class="settings-container" style="margin-top: 24px;">
      <form id="passwordForm">
        <div class="settings-content">
          <h2 class="section-title">Change Password</h2>
          <div class="form-grid">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password" class="form-control" id="currentPassword" required />
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" class="form-control" id="newPassword" required minlength="6" />
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" class="form-control" id="confirmPassword" required minlength="6" />
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button type="submit" class="btn btn-primary" id="changePasswordBtn">Update Password</button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/api.js?v=3"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!window.API.isAuthenticated()) {
        window.location.href = '../auth/login.html';
        return;
      }
      
      const avatar = document.getElementById("userAvatar");
      if (avatar) avatar.textContent = window.API.getUserInitials();

      await loadProfile();

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveProfileBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        btn.disabled = true;

        try {
          const profileData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            phoneNumber: document.getElementById('phone').value
          };
          const updatedUser = await window.API.User.updateProfile(profileData);
          if (updatedUser) {
            window.API.setCurrentUser(updatedUser);
            if (avatar) avatar.textContent = window.API.getUserInitials();
            showToast('Profile updated successfully!');
          }
        } catch (error) {
          showToast('Failed to update profile: ' + error.message, 'danger');
        } finally {
          btn.innerHTML = 'Save Changes';
          btn.disabled = false;
        }
      });

      document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          showToast('New passwords do not match.', 'danger');
          return;
        }

        const btn = document.getElementById('changePasswordBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        try {
          await window.API.User.changePassword({ currentPassword, newPassword });
          showToast('Password changed successfully!');
          document.getElementById('passwordForm').reset();
        } catch (error) {
          showToast('Failed to change password: ' + (error.message || 'Unknown error'), 'danger');
        } finally {
          btn.innerHTML = 'Update Password';
          btn.disabled = false;
        }
      });
    });

    async function loadProfile() {
      try {
        const user = await window.API.User.getProfile();
        document.getElementById('firstName').value = user.firstName;
        document.getElementById('lastName').value = user.lastName;
        document.getElementById('email').value = user.email;
        document.getElementById('phone').value = user.phoneNumber || '';
        document.getElementById('role').value = user.role;
      } catch (error) {
        showToast('Failed to load profile details.');
      }
    }
  </script>
</body>
</html>
